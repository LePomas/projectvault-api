services:
  api:
    build: .
    container_name: projectvault-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DOCUMENT_STORAGE_BACKEND: ${DOCUMENT_STORAGE_BACKEND:-local}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_PUBLIC_ENDPOINT_URL: ${S3_PUBLIC_ENDPOINT_URL:-http://localhost:9000}
      S3_BUCKET: ${S3_BUCKET:-projectvault-documents}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-projectvault}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-projectvault-secret}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_PRESIGNED_URL_EXPIRES_SECONDS: ${S3_PRESIGNED_URL_EXPIRES_SECONDS:-900}
    depends_on:
      db:
        condition: service_started
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts:ro
      - ./storage:/app/storage

  db:
    image: postgres:16
    container_name: projectvault-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: projectvault
      POSTGRES_USER: projectvault
      POSTGRES_PASSWORD: projectvault
    ports:
      - "5432:5432"
    volumes:
      - projectvault-postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro

  minio:
    image: minio/minio:latest
    container_name: projectvault-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-projectvault}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-projectvault-secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - projectvault-minio-data:/data

  minio-init:
    image: minio/mc:latest
    container_name: projectvault-minio-init
    restart: "no"
    depends_on:
      - minio
    environment:
      S3_BUCKET: ${S3_BUCKET:-projectvault-documents}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-projectvault}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-projectvault-secret}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        until mc alias set local http://minio:9000 "$$S3_ACCESS_KEY" "$$S3_SECRET_KEY"; do
          sleep 1
        done
        mc mb --ignore-existing "local/$$S3_BUCKET"

volumes:
  projectvault-postgres-data:
  projectvault-minio-data:
