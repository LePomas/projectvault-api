name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  FRONTEND_S3_BUCKET: ${{ vars.FRONTEND_S3_BUCKET }}
  FRONTEND_CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.FRONTEND_CLOUDFRONT_DISTRIBUTION_ID }}
  VITE_PROJECTVAULT_API_BASE_URL: ${{ vars.VITE_PROJECTVAULT_API_BASE_URL }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '26'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test frontend
        run: npm test

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Build frontend
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload frontend to S3
        run: aws s3 sync dist "s3://$FRONTEND_S3_BUCKET" --delete

      - name: Invalidate frontend CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$FRONTEND_CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/" "/index.html" "/social-preview.png" "/social-preview.svg"
